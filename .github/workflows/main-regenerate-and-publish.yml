name: Main publish module

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: main-regenerate-and-publish
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Ensure workflow runs from main branch
        shell: bash
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "This workflow must run from the main branch."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build and test module
        shell: pwsh
        working-directory: ./PSLoginEnterprise
        run: |
          Install-Module Pester -Force -Scope CurrentUser
          ./Build.ps1
          Import-Module -Name "./src/PSLoginEnterprise"
          $result = Invoke-Pester -PassThru
          if ($result.FailedCount -gt 0) {
            throw "$($result.FailedCount) Pester tests failed."
          }

      - name: Publish module to PowerShell Gallery
        shell: pwsh
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PSGALLERY_API_KEY)) {
            throw "Repository secret PSGALLERY_API_KEY is missing."
          }
          Publish-Module -Path "./PSLoginEnterprise/src/PSLoginEnterprise" -NuGetApiKey $env:PSGALLERY_API_KEY -Confirm:$false -Verbose
