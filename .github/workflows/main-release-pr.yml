name: Main release PR

on:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: main-release-pr
  cancel-in-progress: true

jobs:
  create_or_update_release_pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure dev has new commits vs main
        shell: bash
        run: |
          git fetch origin dev main
          AHEAD_COUNT="$(git rev-list --count origin/main..origin/dev)"
          if [ "$AHEAD_COUNT" -eq 0 ]; then
            echo "No new commits in dev to release."
            exit 1
          fi

      - name: Create or update release PR (dev -> main)
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          EXISTING_PR="$(gh pr list --base main --head dev --state open --json number --jq '.[0].number')"
          if [ -n "$EXISTING_PR" ]; then
            echo "Release PR already open: #$EXISTING_PR"
            gh pr comment "$EXISTING_PR" --body "Release workflow re-run on $(date -u +'%Y-%m-%d %H:%M:%S UTC')."
            gh pr view "$EXISTING_PR" --web
            exit 0
          fi

          gh pr create \
            --base main \
            --head dev \
            --title "chore: release dev to main" \
            --body "$(cat <<'EOF'
## Summary
- Promote the tested `dev` branch changes to `main`.
- This PR is created by the manual release workflow.

## After merge
- Run the `Main regenerate and publish` workflow from `main`.
EOF
)"
